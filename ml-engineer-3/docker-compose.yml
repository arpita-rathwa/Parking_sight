# Optional "prod-like" local stack. The demo also runs with ZERO of this
# (STORAGE_BACKEND=local + sqlite). Bring this up only to show the S3/Postgres path.
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: parksight
      POSTGRES_PASSWORD: parksight
      POSTGRES_DB: parksight
    ports: ["5432:5432"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]

  createbuckets:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      mc mb -p local/parksight-models local/parksight-datasets local/parksight-frames;
      exit 0;"
