name: Weekly Load Test

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  load-test:
    name: Run Locust Load Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust
      - name: Run load tests
        run: |
          locust -f tests/locustfile.py --headless -u 200 -r 10 --run-time 5m \
            --host https://staging.parksight.example.com \
            --csv=output/loadtest
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: output/
