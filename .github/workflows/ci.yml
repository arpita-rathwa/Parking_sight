name: ParkSight CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: parksight

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: flake8 . --exclude=venv,__pycache__ --max-line-length=120
      - name: Run black check
        run: black --check . --exclude=venv
      - name: Run isort check
        run: isort --check-only --profile black .

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: parksight_test
          POSTGRES_USER: parksight
          POSTGRES_PASSWORD: parksight
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov
      - name: Run tests
        run: python -m pytest tests/ -v --cov=./ --cov-report=xml
        env:
          DATABASE_URL: postgresql+psycopg2://parksight:parksight@localhost:5432/parksight_test
          REDIS_URL: redis://localhost:6379/0

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and tag images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          services=("detection-service" "scoring-service" "queue-service" "notification-service" "dashboard-api" "officer-app-api")
          for service in "${services[@]}"; do
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-$service -f Dockerfile.shared .
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-$service $ECR_REGISTRY/$ECR_REPOSITORY:latest-$service
          done

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/Parking_sight/backend
            git pull origin main
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
