name: ParkSight CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engineer-3/**"
      - ".github/workflows/**"
      - "deploy/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ml-engineer-3/**"

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: parksight
  GHCR_REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.1.1 black==24.8.0 isort==5.13.2
      - name: Run flake8
        run: flake8 . --exclude=venv,__pycache__ --max-line-length=120
      - name: Run black check
        run: black --check . --exclude=venv
      - name: Run isort check
        run: isort --check-only --profile black .

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: parksight_test
          POSTGRES_USER: parksight
          POSTGRES_PASSWORD: parksight
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov
      - name: Run tests
        run: python -m pytest tests/ -v --cov=./ --cov-report=xml
        env:
          DATABASE_URL: postgresql+psycopg2://parksight:parksight@localhost:5432/parksight_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-ci-secret-key-12345678901234567890

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        if: env.AWS_ACCESS_KEY_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        if: env.AWS_ACCESS_KEY_ID != ''
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Login to GHCR
        if: env.AWS_ACCESS_KEY_ID == ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set registry URL
        id: set-registry
        run: |
          if [ "${{ env.AWS_ACCESS_KEY_ID }}" != "" ] && [ "${{ steps.login-ecr.outputs.registry }}" != "" ]; then
            echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_ENV"
          else
            echo "ECR_REGISTRY=ghcr.io/${{ github.repository_owner }}" >> "$GITHUB_ENV"
          fi
      - name: Build and tag images
        run: |
          REGISTRY=${ECR_REGISTRY:-parksight}
          services=("detection:services/detection/Dockerfile" "scoring:services/scoring/Dockerfile" "dispatch:Dockerfile.base" "alerts:Dockerfile.base" "analytics:Dockerfile.base" "officers:Dockerfile.base" "ml-platform:Dockerfile")
          for entry in "${services[@]}"; do
            svc="${entry%%:*}"
            df="${entry#*:}"
            if [[ "$svc" == "ml-platform" ]]; then
              cd ../ml-engineer-3
              docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-$svc -f "$df" .
              cd ../backend
            else
              docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-$svc -f "$df" .
            fi
            docker tag $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-$svc $REGISTRY/$ECR_REPOSITORY:latest-$svc
          done
      - name: Build frontend
        run: |
          cd ../frontend
          REGISTRY=${ECR_REGISTRY:-parksight}
          docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-frontend .
          docker tag $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-frontend $REGISTRY/$ECR_REPOSITORY:latest-frontend
      - name: Push images to registry
        if: env.AWS_ACCESS_KEY_ID != '' || env.GITHUB_TOKEN != ''
        run: |
          REGISTRY=${ECR_REGISTRY:-parksight}
          SERVICES=(detection scoring dispatch alerts analytics officers ml-platform frontend)
          for service in "${SERVICES[@]}"; do
            docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}-$service
            docker push $REGISTRY/$ECR_REPOSITORY:latest-$service
          done

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        if: env.AWS_ACCESS_KEY_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy via SSH
        if: env.EC2_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,GHCR_PAT,GHCR_REGISTRY,GITHUB_REPOSITORY_OWNER,GITHUB_SHA,ECR_REPOSITORY
          script: |
            set -e
            cd /opt/parksight
            git pull origin main

            # Log in to container registry
            if [ -n "$AWS_ACCESS_KEY_ID" ]; then
              ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null)
              if [ -z "$ACCOUNT_ID" ]; then
                echo "ERROR: Could not determine AWS account ID"
                exit 1
              fi
              aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
              REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
            elif [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_REPOSITORY_OWNER" --password-stdin
              REGISTRY="ghcr.io/$GITHUB_REPOSITORY_OWNER"
            else
              echo "WARNING: No registry credentials available, skipping pull"
              REGISTRY=""
            fi
            export REGISTRY

            # Create .env from example if missing
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              JWT_SECRET=$(python3 -c "import secrets; print(secrets.token_hex(32))" 2>/dev/null || openssl rand -hex 32)
              if grep -q "^JWT_SECRET_KEY=" backend/.env; then
                sed -i "s/^JWT_SECRET_KEY=.*/JWT_SECRET_KEY=$JWT_SECRET/" backend/.env
              else
                echo "JWT_SECRET_KEY=$JWT_SECRET" >> backend/.env
              fi
            fi

            export DOMAIN=${DOMAIN:-parksight.example.com}
            cd backend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f
