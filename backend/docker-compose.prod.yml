# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

x-prod-service: &prod-service
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  detection-service:
    <<: *prod-service
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "2G"

  scoring-service:
    <<: *prod-service
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "1G"

  dispatch-service:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "512M"

  analytics-api:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "512M"

  officers-api:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "512M"

  alerts-service:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "512M"

  ml-platform-api:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "1G"

  frontend:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "256M"

  postgres:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "2G"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    <<: *prod-service
    deploy:
      resources:
        limits:
          memory: "512M"

  kafka:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: "2G"

  zookeeper:
    restart: unless-stopped
