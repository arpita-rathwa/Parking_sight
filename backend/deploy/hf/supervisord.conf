[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:postgres]
command=/usr/lib/postgresql/16/bin/postgres -D /var/lib/postgresql/data -c config_file=/etc/postgresql/16/main/postgresql.conf
user=postgres
autorestart=true
startsecs=10
startretries=3
stopsignal=INT
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:detection]
command=uvicorn services.detection.main:app --host 0.0.0.0 --port 8001 --log-level warning
directory=/app/backend
environment=PYTHONPATH="/app/backend:/app/backend/services/detection",SERVICE_NAME="detection",DATABASE_URL="postgresql+psycopg2://parksight:parksight@localhost:5432/parksight",REDIS_URL="",KAFKA_BOOTSTRAP_SERVERS="",JWT_SECRET_KEY="hf-demo-jwt-secret-key",CORS_ORIGINS="*",RATE_LIMIT_ENABLED="false"
user=root
autorestart=true
startsecs=10
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
[program:scoring]
command=uvicorn services.scoring.main:app --host 0.0.0.0 --port 8002 --log-level warning
directory=/app/backend
environment=PYTHONPATH="/app/backend",SERVICE_NAME="scoring",DATABASE_URL="postgresql+psycopg2://parksight:parksight@localhost:5432/parksight",REDIS_URL="",KAFKA_BOOTSTRAP_SERVERS="",JWT_SECRET_KEY="hf-demo-jwt-secret-key",CORS_ORIGINS="*",RATE_LIMIT_ENABLED="false"
user=root
autorestart=true
startsecs=10
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
# no depends_on — supervisor doesn't support it

