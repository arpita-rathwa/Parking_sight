version: "3.9"

x-common-env: &common-env
  PYTHONPATH: /app
  DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg2://parksight:parksight@postgres:5432/parksight}"
  REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
  KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
  CORS_ORIGINS: "${CORS_ORIGINS:-*}"
  SENTRY_DSN: "${SENTRY_DSN:-}"
  RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"

services:
  traefik:
    image: traefik:v3.1
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@parksight.local}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.parksight.local`)"
      - "traefik.http.routers.api.service=api@internal"
    depends_on:
      - frontend
      - detection-service
      - scoring-service
      - dispatch-service
      - analytics-api
      - officers-api
      - alerts-service
      - ml-platform-api

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-parksight}"
      POSTGRES_USER: "${POSTGRES_USER:-parksight}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-parksight}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parksight}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-parksight.local}`) || PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  detection-service:
    build:
      context: .
      dockerfile: services/detection/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      SERVICE_NAME: detection
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.detection.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/detect`)"
      - "traefik.http.routers.detection.entrypoints=web"
      - "traefik.http.services.detection.loadbalancer.server.port=8001"

  scoring-service:
    build:
      context: .
      dockerfile: services/scoring/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVICE_NAME: scoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scoring.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/zones`)"
      - "traefik.http.routers.scoring.entrypoints=web"
      - "traefik.http.services.scoring.loadbalancer.server.port=8002"

  dispatch-service:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    expose:
      - "8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVICE_NAME: dispatch
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dispatch.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/dispatch`)"
      - "traefik.http.routers.dispatch.entrypoints=web"
      - "traefik.http.services.dispatch.loadbalancer.server.port=8003"

  analytics-api:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    expose:
      - "8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      SERVICE_NAME: analytics
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analytics.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/analytics`)"
      - "traefik.http.routers.analytics.entrypoints=web"
      - "traefik.http.services.analytics.loadbalancer.server.port=8004"

  officers-api:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn main:app --host 0.0.0.0 --port 8005
    expose:
      - "8005"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      SERVICE_NAME: officers
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.officers.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/officer`)"
      - "traefik.http.routers.officers.entrypoints=web"
      - "traefik.http.services.officers.loadbalancer.server.port=8005"

  alerts-service:
    build:
      context: .
      dockerfile: Dockerfile.base
    command: uvicorn main:app --host 0.0.0.0 --port 8006
    expose:
      - "8006"
    depends_on:
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      SERVICE_NAME: alerts
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alerts.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/notifications`)"
      - "traefik.http.routers.alerts.entrypoints=web"
      - "traefik.http.services.alerts.loadbalancer.server.port=8006"

  seed:
    build:
      context: .
      dockerfile: Dockerfile.base
    working_dir: /app
    command: python scripts/seed.py
    profiles:
      - seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env

  ml-platform-api:
    build:
      context: ../ml-engineer-3
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8007
    expose:
      - "8007"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      <<: *common-env
      SERVICE_NAME: ml-platform
      KAFKA_BOOTSTRAP: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlplatform.rule=Host(`${DOMAIN:-parksight.local}`) && PathPrefix(`/api/v1/forecast`, `/api/v1/officer/feedback`, `/api/v1/review`, `/api/v1/ml`)"
      - "traefik.http.routers.mlplatform.entrypoints=web"
      - "traefik.http.services.mlplatform.loadbalancer.server.port=8007"

volumes:
  pgdata:
  redisdata:
  letsencrypt:
